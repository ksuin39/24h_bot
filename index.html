<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 대시보드 - 메인</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-800 text-white flex flex-col justify-between hidden md:flex">
        <div class="p-5">
            <h1 class="text-2xl font-bold mb-10">Dashboard</h1>
            <nav class="space-y-4">
                <a href="#" class="block py-2.5 px-4 rounded bg-slate-700 text-white font-medium">🏠 홈 (Overview)</a>
                <a href="#" class="block py-2.5 px-4 rounded text-slate-300 hover:bg-slate-700 hover:text-white">📊 통계 분석</a>
                <a href="#" class="block py-2.5 px-4 rounded text-slate-300 hover:bg-slate-700 hover:text-white">👤 사용자 관리</a>
                <a href="#" class="block py-2.5 px-4 rounded text-slate-300 hover:bg-slate-700 hover:text-white">⚙️ 설정</a>
            </nav>
        </div>
        <div class="p-5 text-sm text-slate-400 border-t border-slate-700">
            v1.0.0
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-y-auto">
        
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-800">대시보드 홈</h2>
            <div class="flex items-center space-x-4">
                <button class="text-gray-500 hover:text-gray-700">🔔 알림</button>
                <div class="w-8 h-8 rounded-full bg-slate-400 flex items-center justify-center text-white text-sm font-bold">
                    User
                </div>
            </div>
        </header>

        <main class="p-6 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-200">
                    <p class="text-sm font-medium text-gray-500">오늘 방문자 수</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">1,234 명</p>
                    <p class="text-xs text-green-600 mt-1">▲ 전일 대비 12% 증가</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-200">
                    <p class="text-sm font-medium text-gray-500">당월 매출</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">₩4,560,000</p>
                    <p class="text-xs text-green-600 mt-1">▲ 지난달 대비 5% 증가</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-200">
                    <p class="text-sm font-medium text-gray-500">처리 대기 문의</p>
                    <p class="text-3xl font-bold text-gray-900 mt-2">7 건</p>
                    <p class="text-xs text-red-500 mt-1">⚠️ 빠른 확인 필요</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-200 h-96 flex items-center justify-center text-gray-400">
                (여기에 향후 차트나 데이터 테이블을 넣을 예정입니다)
            </div>

        </main>
    </div>

</body>
</html>
