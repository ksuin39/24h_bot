
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이낸스 선물 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #fff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; }
    .card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .card .value { font-size: 22px; font-weight: 600; }
    .pos-table { width: 100%; border-collapse: collapse; }
    .pos-table th { text-align: left; font-size: 12px; color: #888; padding: 8px 12px;
                    border-bottom: 1px solid #2a2a2a; font-weight: 500; }
    .pos-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid #1e1e1e; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .long { background: #0d2e1a; color: #22c55e; }
    .short { background: #2e0d0d; color: #ef4444; }
    .pnl-pos { color: #22c55e; }
    .pnl-neg { color: #ef4444; }
    .status-green { color: #22c55e; }
    .status-amber { color: #f59e0b; }
    .status-red { color: #ef4444; }
    .section-title { font-size: 14px; font-weight: 600; color: #ccc; margin-bottom: 12px; }
    .table-wrap { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
    .refresh-btn { background: #2a2a2a; color: #ccc; border: none; padding: 8px 16px;
                   border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 20px; }
    .refresh-btn:hover { background: #333; }
    .error-msg { color: #ef4444; background: #2e0d0d; border: 1px solid #4a1414;
                 padding: 12px 16px; border-radius: 8px; font-size: 13px; }
    .empty { text-align: center; padding: 32px; color: #555; font-size: 13px; }
    .updated { font-size: 11px; color: #555; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>📊 바이낸스 선물 대시보드</h1>
  <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
  <span class="updated" id="updated-time"></span>

  <div id="error-area"></div>

  <div class="grid" id="summary-cards">
    <div class="card"><div class="label">로딩 중...</div><div class="value">-</div></div>
  </div>

  <div class="section-title">현재 포지션</div>
  <div class="table-wrap">
    <table class="pos-table">
      <thead>
        <tr>
          <th>종목</th><th>방향</th><th>수량</th><th>진입가</th>
          <th>현재가</th><th>미실현 손익</th><th>수익률</th><th>레버리지</th>
        </tr>
      </thead>
      <tbody id="pos-body"><tr><td colspan="8" class="empty">로딩 중...</td></tr></tbody>
    </table>
  </div>

  <script>
    async function loadData() {
      document.getElementById("error-area").innerHTML = "";
      try {
        const res = await fetch("/api/futures");
        const data = await res.json();

        if (!data.success) {
          document.getElementById("error-area").innerHTML =
            `<div class="error-msg">⚠️ ${data.error}</div>`;
          return;
        }

        const acc = data.account;

        // 요약 카드
        document.getElementById("summary-cards").innerHTML = `
          <div class="card">
            <div class="label">총 지갑 잔고</div>
            <div class="value">$${acc.total_balance.toLocaleString()}</div>
          </div>
          <div class="card">
            <div class="label">마진 잔고</div>
            <div class="value">$${acc.margin_balance.toLocaleString()}</div>
          </div>
          <div class="card">
            <div class="label">가용 잔고</div>
            <div class="value">$${acc.available_balance.toLocaleString()}</div>
          </div>
          <div class="card">
            <div class="label">미실현 손익</div>
            <div class="value ${acc.unrealized_pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">
              ${acc.unrealized_pnl >= 0 ? '+' : ''}$${acc.unrealized_pnl.toFixed(2)}
            </div>
          </div>
          <div class="card">
            <div class="label">자금 상태</div>
            <div class="value status-${acc.fund_color}">${acc.fund_status}</div>
          </div>
        `;

        // 포지션 테이블
        const tbody = document.getElementById("pos-body");
        if (data.positions.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="empty">현재 보유 포지션 없음</td></tr>';
        } else {
          tbody.innerHTML = data.positions.map(p => `
            <tr>
              <td><b>${p.symbol}</b></td>
              <td><span class="badge ${p.side === 'LONG' ? 'long' : 'short'}">${p.side}</span></td>
              <td>${p.amount}</td>
              <td>$${p.entry_price.toLocaleString()}</td>
              <td>$${p.mark_price.toLocaleString()}</td>
              <td class="${p.unrealized_pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">
                ${p.unrealized_pnl >= 0 ? '+' : ''}$${p.unrealized_pnl.toFixed(2)}
              </td>
              <td class="${p.pnl_pct >= 0 ? 'pnl-pos' : 'pnl-neg'}">
                ${p.pnl_pct >= 0 ? '+' : ''}${p.pnl_pct}%
              </td>
              <td>${p.leverage}x</td>
            </tr>
          `).join("");
        }

        document.getElementById("updated-time").textContent =
          "마지막 업데이트: " + new Date().toLocaleTimeString("ko-KR");

      } catch (e) {
        document.getElementById("error-area").innerHTML =
          `<div class="error-msg">⚠️ 서버 연결 실패: ${e.message}</div>`;
      }
    }

    loadData();
    setInterval(loadData, 30000); // 30초마다 자동 갱신
  </script>
</body>
</html>
