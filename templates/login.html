<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 바이낸스 선물 대시보드</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }
    .logo-area h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }
    .logo-area p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 28px 24px;
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 7px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .input-wrap {
      position: relative;
    }
    .field input {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 11px 42px 11px 13px;
      outline: none;
      transition: border-color 0.15s;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.04em;
    }
    .field input:focus {
      border-color: #f0b90b;
    }
    .toggle-btn {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
    }
    .toggle-btn:hover { color: #888; }
    .submit-btn {
      width: 100%;
      background: #f0b90b;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: #2e0d0d;
      border: 1px solid #4a1414;
      color: #f87171;
      border-radius: 8px;
      font-size: 12px;
      padding: 10px 13px;
      margin-top: 14px;
      display: none;
    }
    .notice {
      margin-top: 18px;
      background: #1a1800;
      border: 1px solid #3a3200;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      color: #a89030;
      line-height: 1.6;
    }
    .notice strong { color: #f0b90b; }
    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #0005;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <span class="icon">📊</span>
      <h1>선물 대시보드</h1>
      <p>Binance Futures Monitor</p>
    </div>

    <div class="card">
      <div class="field">
        <label>API KEY</label>
        <div class="input-wrap">
          <input type="password" id="api-key" placeholder="바이낸스 API 키 입력" autocomplete="off" />
          <button class="toggle-btn" onclick="toggleVis('api-key', this)" type="button">👁</button>
        </div>
      </div>

      <div class="field">
        <label>SECRET KEY</label>
        <div class="input-wrap">
          <input type="password" id="secret-key" placeholder="바이낸스 시크릿 키 입력" autocomplete="off" />
          <button class="toggle-btn" onclick="toggleVis('secret-key', this)" type="button">👁</button>
        </div>
      </div>

      <button class="submit-btn" id="login-btn" onclick="doLogin()">연결하기</button>
      <div class="error-msg" id="error-msg"></div>

      <div class="notice">
        <strong>⚠️ 보안 안내</strong><br>
        API 키는 서버 세션에만 임시 저장되며 DB에 기록되지 않습니다.<br>
        반드시 <strong>읽기 전용(Read Only)</strong> 권한으로 발급하세요.<br>
        출금·거래 권한은 절대 부여하지 마세요.
      </div>
    </div>
  </div>

  <script>
    function toggleVis(id, btn) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "🙈";
      } else {
        input.type = "password";
        btn.textContent = "👁";
      }
    }

    // 엔터키 로그인
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      const apiKey = document.getElementById("api-key").value.trim();
      const secretKey = document.getElementById("secret-key").value.trim();
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("error-msg");

      errEl.style.display = "none";

      if (!apiKey || !secretKey) {
        errEl.textContent = "API 키와 시크릿 키를 모두 입력해주세요.";
        errEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>연결 중...';

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ api_key: apiKey, secret_key: secretKey })
        });
        const data = await res.json();

        if (data.success) {
          btn.textContent = "✅ 연결 성공!";
          setTimeout(() => { window.location.href = "/"; }, 600);
        } else {
          errEl.textContent = data.error;
          errEl.style.display = "block";
          btn.disabled = false;
          btn.textContent = "연결하기";
        }
      } catch (e) {
        errEl.textContent = "서버 연결 실패. 잠시 후 다시 시도해주세요.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "연결하기";
      }
    }
  </script>
</body>
</html>
